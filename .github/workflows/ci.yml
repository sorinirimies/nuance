name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Nushell
        uses: hustcer/setup-nu@v3
        with:
          version: "0.111.0"

      - name: Run tests
        shell: bash
        run: nu test.nu

      - name: Verify install (symlink into autoload)
        shell: bash
        run: |
          nu install.nu
          DIR="$(nu -n -c '$nu.user-autoload-dirs | get 0')"
          test -e "$DIR/nushell-prompt.nu" && echo "✓ installed at $DIR/nushell-prompt.nu"
